<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端远程视频通话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #121212;
            color: #fff;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-box {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
        }
        .video-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        video {
            width: 100%;
            background: #000;
            border-radius: 10px;
            border: 2px solid #333;
            min-height: 300px;
        }
        input {
            padding: 10px 14px;
            width: 300px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            outline: none;
            margin-right: 10px;
        }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }
        .btn-create { background: #2563eb; color: white; }
        .btn-join { background: #059669; color: white; }
        .btn-copy { background: #7c3aed; color: white; }
        .btn-mute { background: #d97706; color: white; }
        .btn-cam { background: #dc2626; color: white; }
        .btn-group {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }
        .tip {
            color: #aaa;
            margin-top: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>云端WebRTC视频通话</h1>

    <div class="control-box">
        <div>
            <input type="text" id="roomInput" placeholder="输入房间号">
            <button class="btn-create" id="createBtn">创建房间</button>
            <button class="btn-join" id="joinBtn">加入房间</button>
            <button class="btn-copy" id="copyBtn">复制房间号</button>
        </div>
        <div class="btn-group">
            <button class="btn-mute" id="muteBtn">静音/取消静音</button>
            <button class="btn-cam" id="camBtn">关闭/打开摄像头</button>
        </div>
        <p class="tip" id="statusTip">等待操作，请创建或加入房间开始通话</p>
    </div>

    <div class="video-wrap">
        <div>
            <h3>本地画面</h3>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div>
            <h3>对方画面</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>
</div>

<script>
    // 页面DOM元素
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const roomInput = document.getElementById('roomInput');
    const createBtn = document.getElementById('createBtn');
    const joinBtn = document.getElementById('joinBtn');
    const copyBtn = document.getElementById('copyBtn');
    const muteBtn = document.getElementById('muteBtn');
    const camBtn = document.getElementById('camBtn');
    const statusTip = document.getElementById('statusTip');

    // WebRTC 配置（公共STUN穿透服务器）
    const rtcConfig = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    let peerConn = null;
    let localStream = null;
    let roomId = '';
    let audioMuted = false;
    let videoClosed = false;

    // 更新状态文字
    function setStatus(text) {
        statusTip.innerText = text;
    }

    // 获取本地摄像头麦克风
    async function getMedia() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                video: true,
                audio: true
            });
            localVideo.srcObject = localStream;
            return true;
        } catch (err) {
            setStatus(`获取摄像头失败：${err.message}，请允许权限并使用HTTPS打开页面`);
            return false;
        }
    }

    // 初始化 Peer 连接
    function createPeerConnection() {
        peerConn = new RTCPeerConnection(rtcConfig);
        // 推送本地流
        localStream.getTracks().forEach(track => {
            peerConn.addTrack(track, localStream);
        });

        // 接收远端视频流
        peerConn.ontrack = (e) => {
            remoteVideo.srcObject = e.streams[0];
            setStatus("已连接对方，通话中");
        };

        // ICE 候选交换（核心P2P穿透）
        peerConn.onicecandidate = async (e) => {
            if (!e.candidate) return;
            // 简易本地存储交换（真实公网多人需要信令服务器，本示例适合双人测试）
            const candidateJson = JSON.stringify(e.candidate);
            localStorage.setItem(`ice_${roomId}_candidate`, candidateJson);
        };

        peerConn.onconnectionstatechange = () => {
            const state = peerConn.connectionState;
            if (state === "disconnected" || state === "failed") {
                setStatus("连接断开，请刷新页面重新加入房间");
            }
        };
    }

    // 创建房间（发起方）
    createBtn.addEventListener('click', async () => {
        roomId = roomInput.value.trim();
        if (!roomId) {
            setStatus("请输入自定义房间号");
            return;
        }
        const mediaOk = await getMedia();
        if (!mediaOk) return;

        createPeerConnection();
        setStatus("正在创建房间，等待对方加入...");

        // 创建Offer
        const offer = await peerConn.createOffer();
        await peerConn.setLocalDescription(offer);
        localStorage.setItem(`room_${roomId}_offer`, JSON.stringify(offer));
    });

    // 加入房间（接收方）
    joinBtn.addEventListener('click', async () => {
        roomId = roomInput.value.trim();
        if (!roomId) {
            setStatus("请输入房间号");
            return;
        }
        const mediaOk = await getMedia();
        if (!mediaOk) return;

        createPeerConnection();
        const offerStr = localStorage.getItem(`room_${roomId}_offer`);
        if (!offerStr) {
            setStatus("房间不存在，请让对方先创建房间");
            return;
        }

        const offer = JSON.parse(offerStr);
        await peerConn.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConn.createAnswer();
        await peerConn.setLocalDescription(answer);
        localStorage.setItem(`room_${roomId}_answer`, JSON.stringify(answer));
        setStatus("已加入房间，等待建立视频连接");
    });

    // 复制房间号
    copyBtn.addEventListener('click', async () => {
        if (!roomInput.value) return;
        await navigator.clipboard.writeText(roomInput.value);
        setStatus("房间号已复制到剪贴板，发给好友即可加入");
    });

    // 静音切换
    muteBtn.addEventListener('click', () => {
        if (!localStream) return;
        audioMuted = !audioMuted;
        localStream.getAudioTracks().forEach(track => track.enabled = !audioMuted);
        setStatus(audioMuted ? "已静音" : "取消静音");
    });

    // 摄像头开关
    camBtn.addEventListener('click', () => {
        if (!localStream) return;
        videoClosed = !videoClosed;
        localStream.getVideoTracks().forEach(track => track.enabled = !videoClosed);
        setStatus(videoClosed ? "摄像头已关闭" : "摄像头已打开");
    });
</script>
</body>
</html>
